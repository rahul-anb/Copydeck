name: Bug report
description: Something in CopyDeck isn't working as expected
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in
        the sections below — it helps enormously.

  - type: input
    id: version
    attributes:
      label: CopyDeck version
      description: Output of `copydeck --version`
      placeholder: "copydeck 0.1.1"
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Distribution & version
      description: Output of `lsb_release -a` (or `cat /etc/os-release`)
      placeholder: "Ubuntu 24.04 LTS"
    validations:
      required: true

  - type: dropdown
    id: display
    attributes:
      label: Display server
      options:
        - Wayland
        - X11
        - Not sure
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Press Super+C
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Daemon logs
      description: Output of `journalctl --user -u copydeck -n 50 --no-pager`
      render: shell

  - type: textarea
    id: deps
    attributes:
      label: Dependency check
      description: Output of `copydeck check-deps`
      render: shell
