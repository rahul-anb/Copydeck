name: Publish to PyPI

# Triggered when a version tag is pushed, e.g. `git tag v0.1.0 && git push --tags`.
on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build wheel (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pkg-config libgtk-4-dev

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args:    --release --strip --features ui

      - name: Upload wheels as artefacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.arch }}
          path: target/wheels/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download all wheel artefacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
