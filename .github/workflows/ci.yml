name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Treat all compiler warnings as errors in CI.
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test (${{ matrix.os }} / Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:   [ubuntu-22.04, ubuntu-24.04]
        rust: [stable, beta]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain:  ${{ matrix.rust }}
          components: rustfmt, clippy

      # Cache compiled dependencies between runs.
      - uses: Swatinem/rust-cache@v2

      # Sprints 0–1 need only pkg-config for the dep-check binary smoke test.
      # libgtk-4-dev is added in Sprint 4 when the UI crate is introduced.
      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pkg-config

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (all targets)
        run: cargo clippy --all-targets --all-features

      - name: Build
        run: cargo build --all-targets

      - name: Run tests
        run: cargo test --all

  # Verify the package can be built as a pip wheel (no upload).
  maturin-build:
    name: Maturin wheel build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pkg-config

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args:    --release --strip
