<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>CopyDeck Rich Text Fixture</title></head>
<body>
<h1>Rich Text Sample</h1>
<p>This is a <strong>bold</strong> and <em>italic</em> paragraph with a
<a href="https://example.com">hyperlink</a>.</p>
<ul>
  <li>Item one with <code>inline code</code></li>
  <li>Item two with <mark>highlighted text</mark></li>
  <li>Item three with <del>strikethrough</del></li>
</ul>
<pre><code>fn main() {
    println!("Hello, clipboard!");
}</code></pre>
<table>
  <tr><th>Name</th><th>Value</th></tr>
  <tr><td>Alpha</td><td>1</td></tr>
  <tr><td>Beta</td><td>2</td></tr>
</table>
</body>
</html>
